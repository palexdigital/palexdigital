<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="paléX App Store — All your paléX Apps in one place.">
  <title>Official paléX App Store</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #2e2a33;
      color: #f5f5f7;
      overflow-x: hidden;
    }
    #silk-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    
    .page-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
    }

    @media (min-width: 1024px) {
      .page-container {
        flex-direction: row-reverse;
        justify-content: space-around;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 40px;
      }
    }

    /* iPhone Device Frame Styling */
    .iphone-mockup {
      position: relative;
      width: 375px;
      height: 812px;
      background-color: #39045c;
      border-radius: 45px;
      box-shadow: 0 50px 100px -20px rgba(0,0,0,0.6), 0 30px 60px -30px rgba(0,0,0,0.7), inset 0 -2px 6px 0 rgba(255,255,255,0.1);
      border: 12px solid #1a1a1c;
      overflow: hidden;
      flex-shrink: 0;
    }
    .notch {
      position: absolute;
      width: 150px;
      height: 28px;
      background-color: #1a1a1c;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
      z-index: 50;
    }
    .home-indicator {
      width: 134px;
      height: 5px;
      background-color: rgba(255,255,255,0.5);
      border-radius: 100px;
    }

    /* WebKit Scrollbar concealment for cleaner App Store layout inside mockup */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Space Grotesk Font Class Override */
    .space-grotesk { font-family: 'Space Grotesk', sans-serif; }
  </style>
</head>
<body class="flex justify-center items-center">

  <canvas id="silk-canvas"></canvas>

  <div class="page-container">
    
    <header class="text-center lg:text-right mb-10 lg:mb-0 max-w-md lg:max-w-lg z-10 select-none">
      <h1 class="space-grotesk text-4xl lg:text-6xl font-bold tracking-tight text-white mb-3">
        paléX <span class="text-purple-400">App Store</span>
      </h1>
      <p class="text-base lg:text-xl text-gray-400 font-medium">
        Where Great Apps Find Their Audience.
      </p>
    </header>

    <main class="iphone-mockup flex flex-col z-10 select-none">
      <div class="notch"></div>
      
      <div class="flex justify-between items-center px-6 pt-3 pb-2 text-xs font-semibold text-white z-40 relative">
        <div id="live-time">9:41</div>
        <div class="flex items-center gap-1.5 opacity-90">
          <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M2 10h1v1H2zm3-2h1v3H5zm3-3h1v6H8zm3-2h1v8h-1zm3-3h1v11h-1z"/></svg>
          <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><path d="M7 9a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Zm-4.2-3.3a6 6 0 0 1 8.4 0l-1 1a4.5 4.5 0 0 0-6.4 0l-1-1Zm-2-2a9 9 0 0 1 12.4 0l-1 1a7.5 7.5 0 0 0-10.4 0l-1-1Z"/></svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="currentColor"><rect x="0.5" y="0.5" width="18" height="10" rx="2.5" fill="none" stroke="currentColor"/><rect x="2.5" y="2.5" width="14" height="6" rx="1.5"/><path d="M20 3.5h1.5v4H20z" fill="currentColor"/></svg>
        </div>
      </div>

      <div class="flex-1 flex flex-col overflow-y-auto no-scrollbar px-5 pt-4 pb-12 relative">
        
        <div class="mb-4">
          <p class="text-[11px] font-bold text-purple-400 tracking-wider uppercase">Discover</p>
          <h2 class="text-2xl font-bold tracking-tight text-white space-grotesk">paléX Library</h2>
        </div>

        <div class="relative mb-6">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-4 width-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
          <input type="text" id="search-input" placeholder="Search apps..." class="w-full bg-zinc-800/80 border border-zinc-700/50 rounded-xl py-2 pl-9 pr-4 text-sm text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 transition-colors">
        </div>

        <div id="apps-container" class="space-y-3.5">
          </div>
      </div>

      <div id="detail-overlay" class="absolute inset-0 bg-zinc-950 translate-y-full transition-transform duration-300 ease-out z-40 flex flex-col pt-12 pb-8 px-6">
        <button id="close-detail" class="absolute top-4 left-4 bg-zinc-800 hover:bg-zinc-700 text-white rounded-full p-2 focus:outline-none transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <div class="flex-1 flex flex-col justify-center items-center text-center mt-6 overflow-y-auto no-scrollbar">
          <div id="detail-icon" class="w-24 h-24 rounded-full bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center text-white font-bold text-3xl shadow-2xl mb-6 overflow-hidden">
            </div>
          <h3 id="detail-name" class="space-grotesk text-3xl font-bold text-white mb-2"></h3>
          <p id="detail-desc" class="text-sm text-gray-300 leading-relaxed max-w-xs mb-8"></p>

          <a id="detail-download-btn" href="#" target="_blank" rel="noopener noreferrer" class="w-48 bg-purple-600 hover:bg-purple-500 text-white text-center font-bold py-3.5 px-6 rounded-full shadow-lg transform active:scale-95 transition duration-150">
            DOWNLOAD
          </a>
        </div>
      </div>

      <div class="absolute bottom-1 left-0 right-0 flex justify-center py-2 z-50 pointer-events-none">
        <div class="home-indicator"></div>
      </div>
    </main>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
  <script>

    /* ================================================================
       EDIT YOUR APPS HERE — works directly in GitHub's web editor.

       For each app, customize:
         name  : the app name displayed on lists and product details.
         desc  : the targeted marketing description copy text.
         image : fully validated asset image source URL (Falls back to default styling elegantly if missing).
         link  : production landing destination target action address.
    ================================================================ */
    const APPS = [
      {
        name:  "XXXXXXXXXX",
        desc:  "XXXXXXXXXX",
        image: "XXXXXXXXXX",
        link:  "XXXXXXXXXX"
      },
      {
        name:  "XXXXXXXXXX",
        desc:  "XXXXXXXXXX",
        image: "XXXXXXXXXX",
        link:  "XXXXXXXXXX"
      },
      {
        name:  "XXXXXXXXXX",
        desc:  "XXXXXXXXXX",
        image: "XXXXXXXXXX",
        link:  "XXXXXXXXXX"
      },
      {
        name:  "XXXXXXXXXX",
        desc:  "XXXXXXXXXX",
        image: "XXXXXXXXXX",
        link:  "XXXXXXXXXX"
      },
      {
        name:  "XXXXXXXXXX",
        desc:  "XXXXXXXXXX",
        image: "XXXXXXXXXX",
        link:  "XXXXXXXXXX"
      },
      {
        name:  "XXXXXXXXXX",
        desc:  "XXXXXXXXXX",
        image: "XXXXXXXXXX",
        link:  "XXXXXXXXXX"
      },
      {
        name:  "XXXXXXXXXX",
        desc:  "XXXXXXXXXX",
        image: "XXXXXXXXXX",
        link:  "XXXXXXXXXX"
      },
      {
        name:  "XXXXXXXXXX",
        desc:  "XXXXXXXXXX",
        image: "XXXXXXXXXX",
        link:  "XXXXXXXXXX"
      },
    ];
    /* ================================================================ */

    // Render local device clock system output
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const timeString = `${hours}:${minutes}`;
      document.getElementById('live-time').textContent = timeString;
    }
    setInterval(updateClock, 1000);
    updateClock();

    const appsContainer = document.getElementById('apps-container');
    const searchInput = document.getElementById('search-input');
    const detailOverlay = document.getElementById('detail-overlay');
    const closeDetail = document.getElementById('close-detail');

    const detailIcon = document.getElementById('detail-icon');
    const detailName = document.getElementById('detail-name');
    const detailDesc = document.getElementById('detail-desc');
    const detailDownloadBtn = document.getElementById('detail-download-btn');

    // Generate elements dynamically across data indexes
    function renderApps(filterText = '') {
      appsContainer.innerHTML = '';
      const filtered = APPS.filter(app => app.name.toLowerCase().includes(filterText.toLowerCase()));

      if (filtered.length === 0) {
        appsContainer.innerHTML = `<p class="text-center text-sm text-gray-500 py-8">No applications matched query.</p>`;
        return;
      }

      filtered.forEach(app => {
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between bg-zinc-900/60 hover:bg-zinc-800/80 border border-zinc-800/40 rounded-2xl p-3 cursor-pointer transition-all active:scale-[0.98]';
        
        // Circular profile icon composition elements
        const iconContainer = document.createElement('div');
        iconContainer.className = 'w-11 h-11 rounded-full flex-shrink-0 overflow-hidden bg-gradient-to-tr from-purple-500 to-indigo-600 flex items-center justify-center text-white font-bold text-sm shadow-md';
        
        if (app.image) {
          iconContainer.innerHTML = `<img src="${app.image}" alt="${app.name}" class="w-full h-full object-cover">`;
        } else {
          iconContainer.textContent = app.name.substring(0, 2).toUpperCase();
        }

        const details = document.createElement('div');
        details.className = 'flex-1 min-w-0 mx-3';
        details.innerHTML = `
          <h4 class="text-sm font-semibold text-white truncate">${app.name}</h4>
          <p class="text-xs text-gray-400 truncate mt-0.5">${app.desc}</p>
        `;

        const actionBtn = document.createElement('span');
        actionBtn.className = 'bg-zinc-800 hover:bg-purple-600 text-[11px] font-bold text-purple-400 hover:text-white px-3.5 py-1 rounded-full transition-colors tracking-wide uppercase';
        actionBtn.textContent = 'GET';

        row.appendChild(iconContainer);
        row.appendChild(details);
        row.appendChild(actionBtn);

        // Click handler to view app details
        row.addEventListener('click', () => {
          if (app.image) {
            detailIcon.innerHTML = `<img src="${app.image}" alt="${app.name}" class="w-full h-full object-cover">`;
          } else {
            detailIcon.innerHTML = `<span>${app.name.substring(0, 2).toUpperCase()}</span>`;
          }
          detailName.textContent = app.name;
          detailDesc.textContent = app.desc;
          detailDownloadBtn.href = app.link || '#';
          
          detailOverlay.classList.remove('translate-y-full');
        });

        appsContainer.appendChild(row);
      });
    }

    // Input events for real-time search filtering
    searchInput.addEventListener('input', (e) => renderApps(e.target.value));
    closeDetail.addEventListener('click', () => detailOverlay.classList.add('translate-y-full'));

    // Initialize display feed runtime tracking
    renderApps();

    /* Procedural Ambient Silk Background Animation Logic */
    (function() {
      const canvas = document.getElementById('silk-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, t = 0;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      function wait(cb) {
        typeof SimplexNoise !== 'undefined' ? cb() : setTimeout(() => wait(cb), 40);
      }
      wait(() => {
        const s = new SimplexNoise();
        function draw() {
          ctx.fillStyle = '#2e2a33';
          ctx.fillRect(0, 0, W, H);
          for (let i = 0; i < 90; i++) {
            const y0 = (i / 90) * H;
            ctx.beginPath(); ctx.moveTo(0, y0);
            for (let j = 1; j <= 70; j++) {
              const x = (j / 70) * W;
              ctx.lineTo(
                x + s.noise3D(x * 0.003, y0 * 0.003, t * 0.008) * 60,
                y0 + s.noise3D(x * 0.003 + 100, y0 * 0.003, t * 0.008) * 18
              );
            }
            const hue = 270 + s.noise3D(i * 0.12, 0, t * 0.005) * 30;
            const alpha = 0.04 + Math.abs(s.noise3D(i * 0.15, 1, t * 0.004)) * 0.08;
            ctx.strokeStyle = `hsla(${hue},50%,65%,${alpha})`;
            ctx.lineWidth = 1.5; ctx.stroke();
          }
          t++; requestAnimationFrame(draw);
        }
        draw();
      });
    })();
  </script>
</body>
</html>
