<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="paléXlinkhub — All your paléX links in one place.">
  <title>paléXlinkhub | paléX</title>
  <style>
    /* paléXlinkhub — minimal Linktree-style page */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --bg: #0a0a0f;
      --accent: #7c3aed;
      --accent-hover: #8b5cf6;
      --accent-glow: rgba(124, 58, 237, 0.35);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.65);
      --button-bg: rgba(255, 255, 255, 0.06);
      --button-border: rgba(124, 58, 237, 0.45);
      --max-width: 420px;
      --radius: 12px;
    }
    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }
    body {
      min-height: 100dvh;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      justify-content: center;
      padding: 2rem 1.25rem 2.5rem;
      overflow-x: hidden;
    }
    .page {
      width: 100%;
      max-width: var(--max-width);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    /* Fade in on load */
    .fade-in {
      animation: fadeIn 0.7s ease-out both;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    /* Header / profile */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.75rem;
      width: 100%;
    }
    /* Link buttons */
    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.875rem;
      width: 100%;
    }
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: var(--max-width);
      padding: 0.95rem 1.5rem;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      text-align: center;
      background: var(--button-bg);
      border: 1px solid var(--button-border);
      border-radius: var(--radius);
      transition:
        background-color 0.25s ease,
        border-color 0.25s ease,
        transform 0.25s ease,
        box-shadow 0.25s ease;
      cursor: pointer;
    }
    .link-btn:hover,
    .link-btn:focus-visible {
      background-color: rgba(124, 58, 237, 0.18);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--accent-glow);
      outline: none;
    }
    .link-btn:active {
      transform: translateY(0);
    }
    .link-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
    /* Footer */
    .footer {
      margin-top: auto;
      padding-top: 1rem;
      text-align: center;
    }
    .footer p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    /* Responsive */
    @media (max-width: 480px) {
      body {
        padding: 1.5rem 1rem 2rem;
      }
      .page {
        gap: 1.5rem;
      }
      .link-btn {
        padding: 0.875rem 1.25rem;
        font-size: 0.95rem;
      }
    }
    @media (min-width: 768px) {
      .link-btn {
        font-size: 1.05rem;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .fade-in {
        animation: none;
      }
      .link-btn {
        transition: background-color 0.15s ease, border-color 0.15s ease;
      }
      .link-btn:hover,
      .link-btn:focus-visible {
        transform: none;
      }
    }

    /* Loader */
    .loader-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 180px;
      height: 180px;
      font-family: "Inter", sans-serif;
      font-size: 1.2em;
      font-weight: 300;
      color: white;
      border-radius: 50%;
      background-color: transparent;
      user-select: none;
    }

    .loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background-color: transparent;
      animation: loader-rotate 2s linear infinite;
      z-index: 0;
    }

    @keyframes loader-rotate {
      0% {
        transform: rotate(90deg);
        box-shadow:
          0 10px 20px 0 #fff inset,
          0 20px 30px 0 #ad5fff inset,
          0 60px 60px 0 #471eec inset;
      }
      50% {
        transform: rotate(270deg);
        box-shadow:
          0 10px 20px 0 #fff inset,
          0 20px 10px 0 #d60a47 inset,
          0 40px 60px 0 #311e80 inset;
      }
      100% {
        transform: rotate(450deg);
        box-shadow:
          0 10px 20px 0 #fff inset,
          0 20px 30px 0 #ad5fff inset,
          0 60px 60px 0 #471eec inset;
      }
    }

    .loader-letter {
      display: inline-block;
      opacity: 0.4;
      transform: translateY(0);
      animation: loader-letter-anim 2s infinite;
      z-index: 1;
      border-radius: 50ch;
      border: none;
    }

    .loader-letter:nth-child(1) { animation-delay: 0s; }
    .loader-letter:nth-child(2) { animation-delay: 0.1s; }
    .loader-letter:nth-child(3) { animation-delay: 0.2s; }
    .loader-letter:nth-child(4) { animation-delay: 0.3s; }
    .loader-letter:nth-child(5) { animation-delay: 0.4s; }
    .loader-letter:nth-child(6) { animation-delay: 0.5s; }
    .loader-letter:nth-child(7) { animation-delay: 0.6s; }
    .loader-letter:nth-child(8) { animation-delay: 0.7s; }
    .loader-letter:nth-child(9) { animation-delay: 0.8s; }
    .loader-letter:nth-child(10) { animation-delay: 0.9s; }

    @keyframes loader-letter-anim {
      0%,
      100% {
        opacity: 0.4;
        transform: translateY(0);
      }
      20% {
        opacity: 1;
        transform: scale(1.15);
      }
      40% {
        opacity: 0.7;
        transform: translateY(0);
      }
    }

    /* Shooting Stars */
    .star {
      position: fixed;
      top: 0;
      left: 0;
      width: 3px;
      height: 3px;
      background: #a595e8;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px #a595e8;
      animation: shoot linear infinite;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes shoot {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(var(--angle));
      }
      100% {
        opacity: 0;
        transform: translate(var(--dist), var(--dist)) rotate(var(--angle));
      }
    }
  </style>
</head>
<body>
  <main class="page fade-in">
    <header class="profile">
      <div class="loader-wrapper">
        <span class="loader-letter">p</span>
        <span class="loader-letter">a</span>
        <span class="loader-letter">l</span>
        <span class="loader-letter">é</span>
        <span class="loader-letter">X</span>
        <span class="loader-letter">d</span>
        <span class="loader-letter">i</span>
        <span class="loader-letter">g</span>
        <span class="loader-letter">i</span>
        <span class="loader-letter">t</span>
        <span class="loader-letter">a</span>
        <span class="loader-letter">l™</span>
        <div class="loader"></div>
      </div>
    </header>
    
    <nav class="links" id="links" aria-label="Social and contact links">
      <a class="link-btn" href="https://palexdigital.github.io/Overview/">Overview</a>
      <a class="link-btn" href="https://palexdigital.github.io/paleXarchive/">Projects Developed By paléX</a>
      <a class="link-btn" href="https://palexdigital.github.io/paleXappstore/">paléX App Store</a>
      <a class="link-btn" href="https://proper-scarlet-hlnqsd5e.edgeone.dev/paleX_Price_List%20(1)-compressed.pdf">Price List</a>
      <a class="link-btn" href="https://wa.me/27627654746">Contact Us Via WhatsApp</a>
      <a class="link-btn" href="https://www.instagram.com/palexdigitalstudio/">Connect with us on Instagram</a>
      <a class="link-btn" href="mailto:palexdigital@gmail.com">Send Us An Email</a>
      <a class="link-btn" href="https://www.paypal.com/paypalme/palexdigital">Support Our Team Via PayPal</a>
    </nav>
    
    <footer class="footer">
      <p>&copy; <span id="year"></span> paléX. All rights reserved.</p>
    </footer>
  </main>

  <script>
    // Auto-update footer copyright year
    const yearEl = document.getElementById('year');
    if (yearEl) {
      yearEl.textContent = new Date().getFullYear();
    }

    // Shooting Stars
    function createStar() {
      const star = document.createElement("div");
      star.className = "star";
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = Math.random() * 100 + "vh";
      star.style.setProperty("--angle", Math.random() * 360 + "deg");
      star.style.setProperty("--dist", (Math.random() * 300 + 100) + "px");
      star.style.animationDuration = (Math.random() * 2 + 1) + "s";
      star.style.animationDelay = (Math.random() * 3) + "s";
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 5000);
    }

    setInterval(createStar, 300);
  </script>
</body>
</html>
